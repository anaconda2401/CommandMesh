<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CommandMesh</title>

    <!-- Link App Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- External Libraries: MQTT & Cryptography -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>

    <style>
        :root {
            /* Colors */
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --border: #3f3f46;
            --primary: #10b981;
            --primary-hover: #059669;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            
            /* Typography */
            --font-sys: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            
            /* Spacing */
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            
            /* Radii */
            --radius-md: 8px;
            --radius-lg: 12px;
            
            /* Transitions */
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-sys);
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: var(--space-4);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.5;
        }

        /* Layout Grids */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-3);
            width: 100%;
            max-width: 400px;
        }

        .section-header {
            grid-column: span 2;
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: var(--space-4);
            margin-bottom: calc(var(--space-2) * -1);
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--space-2);
            font-weight: 600;
        }

        /* UI Elements */
        button {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
        }

        button:hover {
            background: var(--surface-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button.primary {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        input {
            width: 100%;
            padding: var(--space-3);
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: var(--text-sm);
            font-family: var(--font-sys);
            transition: border-color var(--transition);
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            width: 100%;
            padding: var(--space-3);
            background: var(--bg);
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            resize: none;
            outline: none;
        }

        .hidden {
            display: none !important;
        }

        .text-link {
            color: var(--primary);
            font-size: var(--text-xs);
            text-decoration: none;
            cursor: pointer;
            transition: color var(--transition);
        }

        .text-link:hover {
            color: var(--primary-hover);
        }

        /* Input Wrappers */
        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: var(--space-2);
        }

        .input-wrapper input {
            margin-bottom: 0;
            padding-right: 40px;
        }

        .toggle-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            padding: 4px;
            cursor: pointer;
            width: auto;
            color: var(--text-muted);
        }
        
        .toggle-btn:hover {
            background: transparent;
            color: var(--text);
            transform: translateY(-50%);
        }

        .toggle-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* Device List Styling */
        .device-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            transition: all var(--transition);
        }

        .device-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .device-card:active {
            transform: translateY(0);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: var(--space-2);
        }

        .online {
            background-color: var(--primary);
        }

        .offline {
            background-color: var(--text-muted);
        }

        /* App Header */
        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: var(--space-6);
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--space-3);
            align-items: center;
        }

        .header-btn {
            border: none;
            background: none;
            padding: 0;
            font-size: var(--text-sm);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .header-btn:hover {
            color: var(--text);
            transform: none;
        }

        /* D-Pad Styling */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-2);
            width: 100%;
            max-width: 250px;
            margin: var(--space-3) auto;
            grid-column: span 2;
        }

        .dpad button {
            padding: var(--space-4) 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dpad .center {
            background: var(--border);
            font-weight: 600;
        }

        .empty-space {
            background: none;
            border: none;
        }
        
        /* Skeleton Animation */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
        }
        
        .skeleton-card {
            height: 72px;
            margin-bottom: var(--space-3);
            width: 100%;
            border-radius: var(--radius-lg);
        }

        svg {
            width: 1.2em;
            height: 1.2em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>

                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>

    </svg>

    <!-- 1. Secure Login UI -->
    <div id="setupView" class="grid">
        <h2 style="grid-column: span 2; color: var(--text); text-align: center; font-weight: 500; margin-bottom: 0;">
            CommandMesh</h2>
        <p style="grid-column: span 2; text-align: center; font-size: var(--text-xs); color: var(--text-muted); margin-top: 0;">Private Device Network</p>

        <div style="grid-column: span 2;">
            <div class="input-wrapper">
                <input type="text" id="brokerIn" placeholder="Broker URL (wss://...:8884/mqtt)">
            </div>
            <div class="input-wrapper">
                <input type="text" id="userIn" placeholder="HiveMQ Username">
            </div>

            <div class="input-wrapper">
                <input type="password" id="passIn" placeholder="HiveMQ Password">
                <button class="toggle-btn" onclick="toggleVis('passIn', this)">
                    <svg><use href="#icon-eye"></use></svg>
                </button>
            </div>

            <div class="input-wrapper">
                <input type="password" id="secretIn" placeholder="Master Passphrase">
                <button class="toggle-btn" onclick="toggleVis('secretIn', this)">
                    <svg><use href="#icon-eye"></use></svg>
                </button>
            </div>

            <div style="text-align: right; margin-bottom: var(--space-4);">
                <a class="text-link" style="display: inline-flex; align-items: center; gap: 4px;" onclick="toggleKeyGen(true)">
                    <svg style="width: 1em; height: 1em;"><use href="#icon-key"></use></svg> Generate Node Public Key
                </a>
            </div>

            <button id="connectBtn" class="primary" onclick="saveAndConnect()" style="width: 100%;">Connect to Mesh</button>
        </div>
    </div>

    <!-- 1.5. Key Generator UI -->
    <div id="keyGenView" class="grid hidden">
        <h2 style="grid-column: span 2; color: var(--text); text-align: center; font-weight: 500; margin-bottom: 0;">
            Key Generator</h2>
        <p style="grid-column: span 2; text-align: center; font-size: var(--text-xs); color: var(--text-muted); margin-top: 0;">Generate your node's Public Key</p>

        <div style="grid-column: span 2;">
            <div class="input-wrapper">
                <input type="password" id="genPassIn" placeholder="Enter your Master Passphrase">
                <button class="toggle-btn" onclick="toggleVis('genPassIn', this)">
                    <svg><use href="#icon-eye"></use></svg>
                </button>
            </div>

            <button onclick="uiGenerateKey()" style="width: 100%; margin-top: var(--space-2);">Generate Key</button>

            <div id="keyOutputContainer" class="hidden" style="margin-top: var(--space-6);">
                <label style="font-size: var(--text-xs); color: var(--text-muted); margin-bottom: var(--space-2); display: block;">Paste this into your Node Setup page:</label>
                <textarea id="pubKeyOutput" rows="2" readonly></textarea>
                <button id="copyBtn" onclick="copyPubKey()" style="width: 100%; margin-top: var(--space-3);">
                    <svg><use href="#icon-copy"></use></svg> Copy to Clipboard
                </button>
            </div>

            <button onclick="toggleKeyGen(false)" style="width: 100%; margin-top: var(--space-6); background: transparent; border: none; color: var(--text-muted);">
                <svg><use href="#icon-arrow-left"></use></svg> Back to Login
            </button>
        </div>
    </div>

    <!-- Main Navigation Header -->
    <div class="header hidden" id="appHeader">
        <button id="backBtn" class="header-btn hidden" onclick="showNetwork()" style="color: var(--primary);">
            <svg><use href="#icon-arrow-left"></use></svg> Network
        </button>
        <span id="titleText" style="font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 500;">Mesh.Net</span>
        <button onclick="logout()" class="header-btn">Logout</button>
    </div>

    <!-- 2. Device Discovery & Network View -->
    <div id="networkView" style="width: 100%; max-width: 400px;" class="hidden">
        <div id="statusText" style="font-size: var(--text-xs); color: var(--text-muted); margin-bottom: var(--space-4); display: flex; align-items: center; gap: var(--space-2);">
            <svg style="animation: shimmer 1s linear infinite;"><use href="#icon-loader-spin"></use></svg> Scanning network...
        </div>
        <div id="deviceContainer">
            <!-- Skeleton loaders will show here while scanning -->
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>
    </div>

    <!-- 3. Dynamic Remote Control View -->
    <div id="remoteView" class="grid hidden">
        <h3 id="targetName" style="grid-column: span 2; margin-top: 0; margin-bottom: var(--space-2); font-weight: 500;">
            Target Device</h3>

        <!-- Media Controls -->
        <div class="section-header">Media & System</div>
        <button onclick="sendCommand('play_pause')"><svg><use href="#icon-play-pause"></use></svg> Play/Pause</button>
        <button onclick="sendCommand('open_youtube')"><svg><use href="#icon-monitor"></use></svg> YouTube</button>
        <button onclick="sendCommand('vol_down')"><svg><use href="#icon-volume-down"></use></svg> Vol Down</button>
        <button onclick="sendCommand('vol_up')"><svg><use href="#icon-volume-up"></use></svg> Vol Up</button>
        <button onclick="sendCommand('home')"><svg><use href="#icon-home"></use></svg> Home/Desktop</button>
        <button onclick="sendCommand('lock_pc')"><svg><use href="#icon-lock"></use></svg> Lock/Sleep</button>

        <!-- D-Pad Navigation -->
        <div class="section-header">Navigation</div>
        <div class="dpad">
            <div class="empty-space"></div>
            <button onclick="sendCommand('dpad_up')"><svg><use href="#icon-up"></use></svg></button>
            <div class="empty-space"></div>

            <button onclick="sendCommand('dpad_left')"><svg><use href="#icon-left"></use></svg></button>
            <button class="center" onclick="sendCommand('dpad_center')">OK</button>
            <button onclick="sendCommand('dpad_right')"><svg><use href="#icon-right"></use></svg></button>

            <div class="empty-space"></div>
            <button onclick="sendCommand('dpad_down')"><svg><use href="#icon-down"></use></svg></button>
            <div class="empty-space"></div>
        </div>

        <!-- Parameterized Data Tools -->
        <div class="section-header">Advanced Tools</div>
        <div class="input-wrapper" style="grid-column: span 2;">
            <input type="text" id="customInput" placeholder="URL, text, or script.bat">
        </div>

        <button onclick="sendCommand('open_url', document.getElementById('customInput').value)"><svg><use href="#icon-globe"></use></svg> Open URL</button>
        <button onclick="sendCommand('type_text', document.getElementById('customInput').value)"><svg><use href="#icon-terminal"></use></svg> Type Text</button>
        <button onclick="sendCommand('run_script', document.getElementById('customInput').value)"
            style="grid-column: span 2; border-color: var(--border);"><svg><use href="#icon-code"></use></svg> Run Script (PC Only)</button>
    </div>

    <!-- Application Logic -->
    <script>
        // Internal Routing Configuration
        const BASE_TOPIC = "commandmesh";
        const DISCOVERY_TOPIC = "commandmesh/discovery/#";

        let client = null;
        let currentTarget = null;
        let devices = JSON.parse(localStorage.getItem('mesh_devices')) || {};

        // --- UI UTILS ---
        function toggleVis(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btn.innerHTML = '<svg><use href="#icon-eye-off"></use></svg>';
            } else {
                input.type = "password";
                btn.innerHTML = '<svg><use href="#icon-eye"></use></svg>';
            }
        }

        // --- CRYPTOGRAPHY UTILS ---
        function hexToUint8Array(hexString) {
            return new Uint8Array(hexString.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
        }

        function generateMyPublicKey(myPassword) {
            const THE_SALT = "CommandMesh_Salt_2026_x8f9d!";
            const seedHex = CryptoJS.SHA256(myPassword + THE_SALT).toString(CryptoJS.enc.Hex);
            const keyPair = nacl.sign.keyPair.fromSeed(hexToUint8Array(seedHex));
            return Array.from(keyPair.publicKey).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- KEY GENERATOR UI LOGIC ---
        function toggleKeyGen(show) {
            if (show) {
                document.getElementById('setupView').classList.add('hidden');
                document.getElementById('keyGenView').classList.remove('hidden');
                document.getElementById('genPassIn').value = document.getElementById('secretIn').value;
            } else {
                document.getElementById('keyGenView').classList.add('hidden');
                document.getElementById('setupView').classList.remove('hidden');
                document.getElementById('keyOutputContainer').classList.add('hidden');
                document.getElementById('secretIn').value = document.getElementById('genPassIn').value;
            }
        }

        function uiGenerateKey() {
            const pass = document.getElementById('genPassIn').value;
            if (!pass) return alert("Please enter a Master Passphrase first.");

            const pubKeyHex = generateMyPublicKey(pass);
            document.getElementById('pubKeyOutput').value = pubKeyHex;
            document.getElementById('keyOutputContainer').classList.remove('hidden');
        }

        function copyPubKey() {
            const copyText = document.getElementById("pubKeyOutput");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);

            const btn = document.getElementById('copyBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<svg><use href="#icon-check"></use></svg> Copied!';
            setTimeout(() => btn.innerHTML = originalHTML, 2000);
        }

        // --- APP INITIALIZATION ---
        function init() {
            if (!localStorage.getItem("mesh_secret")) {
                document.getElementById('setupView').classList.remove('hidden');
                if (localStorage.getItem("mesh_broker")) document.getElementById('brokerIn').value = localStorage.getItem("mesh_broker");
                if (localStorage.getItem("mesh_user")) document.getElementById('userIn').value = localStorage.getItem("mesh_user");
            } else {
                document.getElementById('setupView').classList.add('hidden');
                document.getElementById('appHeader').classList.remove('hidden');
                showNetwork();
                connectMQTT();
            }
        }

        function saveAndConnect() {
            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.innerHTML = '<svg style="animation: shimmer 1s linear infinite;"><use href="#icon-loader-spin"></use></svg> Connecting...';
            
            setTimeout(() => {
                let urlInput = document.getElementById('brokerIn').value.trim();

                // --- SMART URL AUTO-FIXER ---
                if (urlInput) {
                    // 1. Strip any trailing slashes
                    urlInput = urlInput.replace(/\/+$/, '');

                    // 2. Remove http:// or https:// if accidentally pasted
                    urlInput = urlInput.replace(/^https?:\/\//, '');

                    // 3. Add wss:// if missing
                    if (!urlInput.startsWith('ws')) {
                        urlInput = 'wss://' + urlInput;
                    }

                    // 4. Auto-append HiveMQ WebSockets port and path if missing
                    if (urlInput.includes('hivemq.cloud') && !urlInput.includes(':8884')) {
                        urlInput += ':8884/mqtt';
                    }
                }

                localStorage.setItem("mesh_broker", urlInput);
                localStorage.setItem("mesh_user", document.getElementById('userIn').value);
                localStorage.setItem("mesh_pass", document.getElementById('passIn').value);
                localStorage.setItem("mesh_secret", document.getElementById('secretIn').value);
                btn.disabled = false;
                btn.innerHTML = 'Connect to Mesh';
                init();
            }, 300); // Small artificial delay to show loading state
        }

        function logout() {
            localStorage.removeItem("mesh_pass");
            localStorage.removeItem("mesh_secret");
            location.reload();
        }

        function renderDevices() {
            const container = document.getElementById('deviceContainer');
            // Remove skeleton loaders if device list is empty but we have connected
            if (Object.keys(devices).length === 0) {
                 container.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:var(--text-sm); padding:var(--space-4);">No devices found.</div>';
                 return;
            }
            
            container.innerHTML = '';
            Object.values(devices).forEach(d => {
                const isOnline = d.status === 'online';
                const div = document.createElement('div');
                div.className = 'device-card';

                if (isOnline) {
                    div.onclick = () => openRemote(d.id, d.name);
                } else {
                    div.style.opacity = '0.6';
                }

                div.innerHTML = `
                    <div><strong style="color: ${isOnline ? 'var(--text)' : 'var(--text-muted)'}; font-weight: 500;">${d.name}</strong><br><span style="font-size: var(--text-xs); color: var(--text-muted);">${d.id}</span></div>
                    <div><span class="status-dot ${isOnline ? 'online' : 'offline'}"></span></div>
                `;
                container.appendChild(div);
            });
        }

        function connectMQTT() {
            const brokerUrl = localStorage.getItem("mesh_broker");
            client = mqtt.connect(brokerUrl, {
                username: localStorage.getItem("mesh_user"),
                password: localStorage.getItem("mesh_pass"),
                clientId: 'pwa_admin_' + Math.random().toString(16).substr(2, 8)
            });

            client.on('connect', () => {
                document.getElementById('statusText').innerHTML = '<span class="status-dot online"></span> Connected. Listening for devices...';
                client.subscribe(DISCOVERY_TOPIC);
                renderDevices();
            });

            client.on('message', (topic, message) => {
                if (topic.startsWith(BASE_TOPIC + "/discovery/")) {
                    try {
                        const data = JSON.parse(message.toString());
                        devices[data.id] = data;
                        localStorage.setItem('mesh_devices', JSON.stringify(devices));
                        renderDevices();
                    } catch (e) { console.error("Discovery parsing error"); }
                }
            });

            client.on('error', (err) => {
                document.getElementById('statusText').innerHTML = '<span class="status-dot offline" style="background-color: #ef4444;"></span> Connection Error.';
                console.error("MQTT Error:", err);
            });
        }

        function showNetwork() {
            document.getElementById('networkView').classList.remove('hidden');
            document.getElementById('remoteView').classList.add('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            document.getElementById('titleText').innerText = "Mesh.Net";
            renderDevices();
        }

        function openRemote(id, name) {
            currentTarget = id;
            document.getElementById('networkView').classList.add('hidden');
            document.getElementById('remoteView').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');
            document.getElementById('titleText').innerText = "Controlling";
            document.getElementById('targetName').innerText = name;
        }

        function sendCommand(action, dataParam = null) {
            if (!client || !currentTarget) return;

            const myPassword = localStorage.getItem("mesh_secret");
            const ts = Math.floor(Date.now() / 1000);
            const senderId = 'mesh_admin';

            const THE_SALT = "CommandMesh_Salt_2026_x8f9d!";
            const seedHex = CryptoJS.SHA256(myPassword + THE_SALT).toString(CryptoJS.enc.Hex);
            const keyPair = nacl.sign.keyPair.fromSeed(hexToUint8Array(seedHex));

            // F-01 Fix: Format the data string exactly as Python expects it
            const dataString = dataParam === null ? "" : String(dataParam);

            // Inject dataString into the cryptographic message
            const msgToSign = `${action}:${senderId}:${currentTarget}:${dataString}:${ts}`;

            const messageUint8 = new TextEncoder().encode(msgToSign);
            const signatureUint8 = nacl.sign.detached(messageUint8, keyPair.secretKey);
            const signatureHex = Array.from(signatureUint8).map(b => b.toString(16).padStart(2, '0')).join('');

            const payload = JSON.stringify({
                action: action,
                data: dataParam,
                from: senderId,
                to: currentTarget,
                timestamp: ts,
                signature: signatureHex
            });

            client.publish(`${BASE_TOPIC}/${currentTarget}/in`, payload, { qos: 1 });
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden" && client) {
                client.end();
                client = null;
            } else if (document.visibilityState === "visible") {
                if (localStorage.getItem("mesh_secret")) {
                    connectMQTT();
                }
            }
        });

        init();
    </script>
</body>

</html>
